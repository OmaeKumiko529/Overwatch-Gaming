<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/public/logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E426 Overwatch Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">
    <style>
      /* ---- 全屏加载遮罩 ---- */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1a 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity .6s ease, visibility .6s ease;
      }

      #app-loading.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Logo 脉冲动画 */
      .loading-logo {
        width: 100px;
        height: 100px;
        animation: logo-pulse 1.6s ease-in-out infinite;
      }

      @keyframes logo-pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.12); }
      }

      /* 旋转光环 Spinner */
      .loading-spinner {
        margin-top: 32px;
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255,255,255,.15);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin .8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* 文字提示 */
      .loading-text {
        margin-top: 18px;
        font-family: 'Fugaz One', sans-serif;
        font-size: 18px;
        color: rgba(255,255,255,.5);
        letter-spacing: 2px;
        animation: text-blink 1.6s ease-in-out infinite;
      }

      @keyframes text-blink {
        0%, 100% { opacity: .4; }
        50%      { opacity: .9; }
      }
    </style>
  </head>
  <body>
    <!-- 进入页面加载动画：所有资源加载完毕后由 main.js 移除 -->
    <div id="app-loading">
      <img class="loading-logo" src="/public/logo.svg" alt="Loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">LOADING</div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body> 
</html>
