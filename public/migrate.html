<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据迁移工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 40px; display: flex; justify-content: center; }
.container { max-width: 700px; width: 100%; }
h1 { color: #333; margin-bottom: 8px; }
.subtitle { color: #666; margin-bottom: 24px; font-size: 0.95rem; }
.card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stats { display: flex; gap: 20px; margin: 16px 0; }
.stat-box { background: #f8f9fa; border-radius: 8px; padding: 16px; flex: 1; text-align: center; }
.stat-number { font-size: 2rem; font-weight: bold; color: #4facfe; }
.stat-label { color: #666; font-size: 0.85rem; margin-top: 4px; }
button { padding: 14px 32px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
.btn-migrate { background: linear-gradient(135deg, #667eea, #764ba2); color: white; width: 100%; }
.btn-migrate:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
.btn-migrate:disabled { opacity: 0.6; cursor: not-allowed; }
.log { background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 16px; font-family: 'Cascadia Code', monospace; font-size: 0.85rem; max-height: 400px; overflow-y: auto; margin-top: 16px; white-space: pre-wrap; line-height: 1.6; }
.log .success { color: #4ec9b0; }
.log .warn { color: #dcdcaa; }
.log .error { color: #f44747; }
.log .info { color: #9cdcfe; }
.status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
.status-ready { background: #d4edda; color: #155724; }
.status-nodata { background: #fff3cd; color: #856404; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🔄 数据迁移工具</h1>
  <p class="subtitle">将旧的浏览器 localStorage 数据迁移到服务器 SQL 数据库</p>

  <div class="card">
    <h3 style="margin-bottom: 12px;">检测到旧数据</h3>
    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="userCount">-</div>
        <div class="stat-label">用户</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="postCount">-</div>
        <div class="stat-label">帖子</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="teamCount">-</div>
        <div class="stat-label">战队</div>
      </div>
    </div>
    <div id="statusMsg"></div>
  </div>

  <button id="migrateBtn" class="btn-migrate" onclick="startMigration()" disabled>正在检测...</button>

  <div class="log" id="logArea">等待开始...</div>
</div>

<script>
function log(msg, type = 'info') {
  const el = document.getElementById('logArea')
  const time = new Date().toLocaleTimeString()
  el.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`
  el.scrollTop = el.scrollHeight
}

function getToken() {
  try {
    const s = sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser')
    if (s) {
      const u = JSON.parse(s)
      return u.token || null
    }
  } catch {}
  return null
}

function checkData() {
  let users = [], posts = [], teams = []
  try {
    users = JSON.parse(localStorage.getItem('users') || '[]')
    posts = JSON.parse(localStorage.getItem('posts') || '[]')
    teams = JSON.parse(localStorage.getItem('teams') || '[]')
  } catch (e) {
    document.getElementById('statusMsg').innerHTML = 
      `<span class="status-badge status-nodata">⚠️ 读取 localStorage 失败: ${e.message}</span>`
    log('❌ 无法读取 localStorage', 'error')
    return null
  }

  document.getElementById('userCount').textContent = users.length
  document.getElementById('postCount').textContent = posts.length
  document.getElementById('teamCount').textContent = teams.length

  if (users.length === 0 && posts.length === 0 && teams.length === 0) {
    document.getElementById('statusMsg').innerHTML = 
      `<span class="status-badge status-nodata">⚠️ 没有找到可迁移的旧数据</span>`
    document.getElementById('migrateBtn').disabled = true
    document.getElementById('migrateBtn').textContent = '无数据需迁移'
    return null
  }

  const token = getToken()
  if (!token) {
    document.getElementById('statusMsg').innerHTML = 
      `<span class="status-badge status-nodata">⚠️ 未登录！请先登录 Admin 账号再刷新此页面</span>`
    document.getElementById('migrateBtn').disabled = true
    document.getElementById('migrateBtn').textContent = '请先登录 Admin'
    return null
  }

  document.getElementById('statusMsg').innerHTML = 
    `<span class="status-badge status-ready">✅ 已登录，可迁移</span>`
  document.getElementById('migrateBtn').disabled = false
  document.getElementById('migrateBtn').textContent = `🚀 开始迁移 ${users.length} 用户 + ${posts.length} 帖子 + ${teams.length} 战队`

  return { users, posts, teams, token }
}

async function startMigration() {
  const data = checkData()
  if (!data) return

  const btn = document.getElementById('migrateBtn')
  btn.disabled = true
  btn.textContent = '⏳ 迁移中...'

  log('🚀 开始迁移...', 'info')
  log(`📊 用户: ${data.users.length} | 帖子: ${data.posts.length} | 战队: ${data.teams.length}`, 'info')
  log('')

  try {
    const res = await fetch('/api/migrate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${data.token}`
      },
      body: JSON.stringify({
        users: data.users,
        posts: data.posts,
        teams: data.teams
      })
    })

    const result = await res.json()

    if (result.success) {
      const r = result.result
      log('✅ 迁移完成！', 'success')
      log(`   📦 用户迁移: ${r.users} 个`, 'success')
      log(`   📄 帖子迁移: ${r.posts} 个`, 'success')
      log(`   🏆 战队迁移: ${r.teams} 个`, 'success')
      
      if (r.errors && r.errors.length > 0) {
        log('')
        log(`⚠️ ${r.errors.length} 个警告:`, 'warn')
        r.errors.forEach(e => log(`   ${e}`, 'warn'))
      }

      log('')
      log('✅ 刷新页面后即可看到迁移后的数据！', 'success')
      btn.textContent = '✅ 迁移完成！刷新页面查看'
    } else {
      log(`❌ 迁移失败: ${result.message}`, 'error')
      btn.textContent = '❌ 迁移失败，重试'
      btn.disabled = false
    }
  } catch (e) {
    log(`❌ 网络错误: ${e.message}`, 'error')
    log('请确保后端服务器已运行在 localhost:3001', 'error')
    btn.textContent = '❌ 失败，重试'
    btn.disabled = false
  }
}

// 页面加载时检查
window.addEventListener('DOMContentLoaded', () => {
  const token = getToken()
  if (token) {
    log('✅ 已检测到登录状态', 'success')
  } else {
    log('⚠️ 未登录！请先登录访问此页面', 'warn')
  }
  
  const data = checkData()
  if (data) {
    log(`📊 找到 ${data.users.length} 用户, ${data.posts.length} 帖子, ${data.teams.length} 战队`, 'info')
    log('点击「开始迁移」按钮将数据写入 SQL 数据库', 'info')
    log('⚠️ 迁移后不会删除浏览器 localStorage 中的原始数据', 'warn')
  }
})
</script>
</body>
</html>
